name: Deploy Production (Client)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: deploy-client-prod-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Run checks
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

  deploy:
    name: Deploy Vercel
    runs-on: ubuntu-latest
    needs: quality-gates
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROD_API_HEALTH_URL: ${{ secrets.PROD_API_HEALTH_URL }}
        run: |
          for var in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID PROD_API_HEALTH_URL; do
            if [ -z "${!var}" ]; then
              echo "Falta secret ${var}"
              exit 1
            fi
          done

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel production
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" | tail -n1)"
          echo "deployment_url=${deployment_url}" >> "${GITHUB_OUTPUT}"

      - name: Smoke tests (frontend + API)
        env:
          PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
          PROD_API_HEALTH_URL: ${{ secrets.PROD_API_HEALTH_URL }}
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment_url }}
        run: |
          smoke_url="${PROD_FRONTEND_URL}"
          if [ -z "${smoke_url}" ]; then
            smoke_url="${DEPLOYMENT_URL}"
          fi

          if [[ "${smoke_url}" != http* ]]; then
            smoke_url="https://${smoke_url}"
          fi

          curl --fail --show-error --silent "${smoke_url}/login" >/dev/null
          curl --fail --show-error --silent "${smoke_url}/catalog" >/dev/null
          curl --fail --show-error --silent "${PROD_API_HEALTH_URL}" >/dev/null

      - name: Summary
        env:
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.deployment_url }}
        run: |
          {
            echo "## Client deploy completado"
            echo "- Tag: \`${GITHUB_REF_NAME}\`"
            echo "- Deployment URL: \`${DEPLOYMENT_URL}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
